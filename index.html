<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f1ec">
<title>Bar Soutsu カクテルレシピ帳</title>
<style>
  :root {
    color-scheme: light;
    --bg: #e9e9e5;
    --paper: #fbfaf6;
    --panel: #fbfaf6;
    --panel-soft: #f3f2ee;
    --line: #c9c8c2;
    --line-strong: #242424;
    --text: #161616;
    --muted: #6f6d67;
    --accent: #161616;
    --red: #a72821;
    --shadow: 0 18px 42px rgba(30, 30, 27, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
  }

  /* ====== サイト共通ナビ ====== */
  .site-nav {
    width: min(960px, calc(100% - 24px));
    margin: 24px auto 0;
    display: flex;
    border: 1px solid var(--line-strong);
    border-bottom: 0;
    background: var(--panel);
  }
  .site-nav-link {
    padding: 0 18px;
    min-height: 38px;
    display: grid;
    place-items: center;
    text-decoration: none;
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-right: 1px solid var(--line);
    transition: background 160ms ease;
    white-space: nowrap;
  }
  .site-nav-link:last-child { border-right: 0; }
  .site-nav-link:hover { background: var(--panel-soft); }
  .site-nav-link.active { background: var(--accent); color: #fff; }
  body.has-nav .app-shell { margin-top: 0; }

  /* ====== 外枠 ====== */
  .app-shell {
    width: min(960px, calc(100% - 24px));
    min-height: calc(100vh - 48px);
    margin: 24px auto;
    padding: 28px;
    border: 1px solid var(--line-strong);
    background: var(--paper);
    box-shadow: var(--shadow);
  }

  /* ====== ヘッダー ====== */
  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 230px;
    gap: 18px;
    align-items: stretch;
    padding: 0 0 18px;
    border-bottom: 2px solid var(--line-strong);
  }
  .brand-mark { margin: 0 0 8px; font-size: clamp(1.05rem, 2.5vw, 1.5rem); line-height: 1; font-weight: 700; }
  .eyebrow { margin: 0 0 8px; color: var(--muted); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  h1 { margin: 0; font-size: clamp(1.05rem, 2.5vw, 1.55rem); line-height: 1.18; font-weight: 700; }
  .lead { max-width: 620px; margin: 10px 0 0; color: var(--muted); font-size: 0.78rem; line-height: 1.65; }
  .hero-panel {
    padding: 14px;
    border: 1px solid var(--line-strong);
    background: transparent;
    display: grid;
    align-content: center;
  }
  .hero-panel span, .hero-panel small {
    display: block; color: var(--muted); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .hero-panel strong { display: block; margin: 6px 0 2px; color: var(--red); font-size: 1.65rem; font-weight: 700; }

  /* ====== カテゴリタブ ====== */
  .tabs {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    border: 1px solid var(--line-strong);
    background: var(--panel);
  }
  .tab {
    flex: 1 1 auto;
    min-height: 40px;
    padding: 0 16px;
    border: 0;
    border-right: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
    white-space: nowrap;
  }
  .tab:last-child { border-right: 0; }
  .tab:hover { background: var(--panel-soft); }
  .tab.active { background: var(--accent); color: #fff; }

  /* ====== レシピカード一覧 ====== */
  .recipe-grid {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    border: 1px solid var(--line);
    border-bottom: 0;
    border-right: 0;
  }
  .recipe-card {
    padding: 20px;
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line);
    background: var(--panel);
    cursor: pointer;
    transition: background 160ms ease;
  }
  .recipe-card:hover { background: var(--panel-soft); }
  .recipe-cat {
    display: inline-block;
    margin-bottom: 8px;
    color: var(--red);
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .recipe-name { margin: 0 0 12px; font-size: 1rem; font-weight: 700; line-height: 1.4; }
  .recipe-ingredients {
    list-style: none;
    margin: 0;
    padding: 10px 0 0;
    border-top: 1px solid var(--line);
  }
  .recipe-ingredients li {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.78rem;
    border-bottom: 1px dashed var(--line);
  }
  .recipe-ingredients li .amount { color: var(--muted); font-weight: 700; font-size: 0.72rem; margin-left: 8px; white-space: nowrap; }

  /* ====== 詳細モーダル ====== */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(22, 22, 22, 0.65);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 24px;
    overflow-y: auto;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    background: var(--paper);
    border: 1px solid var(--line-strong);
    box-shadow: var(--shadow);
    width: min(560px, 100%);
    margin: auto;
    padding: 28px;
  }
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--line-strong);
  }
  .detail-close {
    min-height: 32px;
    padding: 0 12px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 16px;
    transition: background 160ms ease;
  }
  .detail-close:hover { background: var(--panel-soft); }
  .detail-section-title {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  .detail-ingredients { list-style: none; margin: 0; padding: 0; }
  .detail-ingredients li {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    font-size: 0.84rem;
    border-bottom: 1px dashed var(--line);
  }
  .detail-ingredients li .amount { color: var(--muted); font-weight: 700; font-size: 0.78rem; margin-left: 16px; white-space: nowrap; }
  .detail-steps { list-style: none; margin: 0; padding: 0; counter-reset: steps; }
  .detail-steps li {
    counter-increment: steps;
    display: flex;
    gap: 12px;
    padding: 9px 0;
    font-size: 0.84rem;
    line-height: 1.65;
    border-bottom: 1px solid var(--line);
  }
  .detail-steps li::before {
    content: counter(steps);
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 0.66rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .detail-note {
    margin-top: 14px;
    padding: 12px 14px;
    background: var(--panel-soft);
    border-left: 3px solid var(--line-strong);
    font-size: 0.78rem;
    line-height: 1.7;
    color: var(--muted);
  }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    border: 1px solid var(--line);
    border-top: 0;
    margin-top: 16px;
  }

  footer {
    color: var(--muted);
    font-size: 0.64rem;
    line-height: 1.8;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  /* ====== スマホ対応 ====== */
  @media (max-width: 620px) {
    .site-nav { width: min(100% - 16px, 1180px); margin: 8px auto 0; }
    .app-shell { width: min(100% - 16px, 1180px); margin: 0 auto 16px; padding: 14px; }
    .hero { grid-template-columns: 1fr; }
    .recipe-grid { grid-template-columns: 1fr; }
    .detail-overlay { padding: 12px; }
    .detail-panel { padding: 18px; }
  }
</style>
</head>
<body class="has-nav">

<nav class="site-nav">
  <a class="site-nav-link" href="https://sousuyou.github.io/cocktail-cost-tool/">原価計算</a>
  <a class="site-nav-link active" href="https://sousuyou.github.io/cocktail-recipe-book/">レシピ帳</a>
  <a class="site-nav-link" href="https://sousuyou.github.io/gin-textbook/">ジン教本</a>
  <a class="site-nav-link" href="https://sousuyou.github.io/gin-news/">ジンニュース</a>
</nav>

<main class="app-shell">

  <section class="hero">
    <div>
      <p class="brand-mark">Bar Soutsu</p>
      <p class="eyebrow">Cocktail Recipe Book / Gin Speciality</p>
      <h1>カクテルレシピ帳</h1>
      <p class="lead">Bar Soutsuのカクテルレシピ集です。レシピをタップすると材料・手順の詳細が確認できます。</p>
    </div>
    <div class="hero-panel" aria-label="レシピ数">
      <span>レシピ数</span>
      <strong id="recipe-count">0</strong>
      <small>件</small>
    </div>
  </section>

  <nav class="tabs" id="tabs" aria-label="カテゴリ"></nav>

  <div class="recipe-grid" id="recipe-grid" aria-label="レシピ一覧"></div>

  <footer>
    レシピをタップすると材料と作り方の詳細が開きます。
  </footer>

</main>

<!-- 詳細モーダル -->
<div class="detail-overlay" id="detail-overlay" role="dialog" aria-modal="true">
  <div class="detail-panel">
    <div class="detail-header">
      <div>
        <div class="recipe-cat" id="detail-cat"></div>
        <h2 id="detail-name" style="margin: 4px 0 0; font-size: 1.2rem; font-weight: 700;"></h2>
      </div>
      <button class="detail-close" id="detail-close">閉じる</button>
    </div>
    <div class="detail-section-title">材料</div>
    <ul class="detail-ingredients" id="detail-ingredients"></ul>
    <div class="detail-section-title">作り方</div>
    <ol class="detail-steps" id="detail-steps"></ol>
    <div class="detail-note" id="detail-note" style="display:none;"></div>
  </div>
</div>

<script>
/* =========================================================
   ■ レシピデータ
   新しいレシピを追加するには、この配列にオブジェクトを追加します。
   ========================================================= */
const RECIPES = [
  {
    id: "gin-tonic",
    name: "ジン＆トニック",
    category: "ロング",
    ingredients: [
      { name: "ジン",               amount: "45ml" },
      { name: "トニックウォーター", amount: "120ml" },
      { name: "ライム（スライス）", amount: "1枚" },
    ],
    steps: [
      "コリンズグラスに氷をたっぷり入れる",
      "ジンを注ぐ",
      "冷えたトニックウォーターをグラスの縁に沿ってゆっくり注ぐ",
      "バースプーンで一回だけ軽く混ぜる",
      "ライムをグラスの縁に飾る",
    ],
    note: "トニックを高い位置から注ぐと炭酸が抜けます。できるだけグラスの縁に沿って低く注ぐのがポイントです。",
  },
  {
    id: "dry-martini",
    name: "ドライ・マティーニ",
    category: "ショート",
    ingredients: [
      { name: "ジン",                       amount: "60ml" },
      { name: "ドライベルモット",           amount: "10ml" },
      { name: "レモンピール（またはオリーブ）", amount: "適量" },
    ],
    steps: [
      "ミキシンググラスに氷を入れ、十分に冷やす",
      "ドライベルモット、ジンの順に注ぐ",
      "バースプーンで15〜20秒ゆっくりステアする",
      "冷やしておいたカクテルグラスに注ぐ",
      "レモンピールをひねってアロマを飛ばし、グラスに飾る",
    ],
    note: "シェイクではなくステアが基本です。ジンの比率を高めるほどドライな仕上がりになります。",
  },
  {
    id: "negroni",
    name: "ネグローニ",
    category: "ショート",
    ingredients: [
      { name: "ジン",             amount: "30ml" },
      { name: "スイートベルモット", amount: "30ml" },
      { name: "カンパリ",         amount: "30ml" },
      { name: "オレンジピール",   amount: "適量" },
    ],
    steps: [
      "ロックグラスに氷を入れる",
      "ジン・スイートベルモット・カンパリを等量注ぐ",
      "バースプーンで軽くステアする",
      "オレンジピールをひねって香りを飛ばし、飾る",
    ],
    note: "3種類を等量で合わせるシンプルなレシピです。使うジンによって印象が大きく変わります。",
  },
  {
    id: "gimlet",
    name: "ギムレット",
    category: "ショート",
    ingredients: [
      { name: "ジン",                     amount: "45ml" },
      { name: "ライムジュース（フレッシュ）", amount: "15ml" },
      { name: "シュガーシロップ",         amount: "10ml" },
    ],
    steps: [
      "シェイカーに氷を入れる",
      "全材料を注ぐ",
      "しっかりシェイクする（10〜12秒）",
      "冷やしたカクテルグラスに注ぐ",
    ],
    note: "フレッシュライムを使うと風味が格段によくなります。甘さはシロップの量で調整してください。",
  },
  {
    id: "tom-collins",
    name: "トム・コリンズ",
    category: "ロング",
    ingredients: [
      { name: "ジン",                      amount: "45ml" },
      { name: "レモンジュース（フレッシュ）", amount: "20ml" },
      { name: "シュガーシロップ",          amount: "15ml" },
      { name: "ソーダ水",                  amount: "60ml" },
      { name: "レモンスライス・チェリー",  amount: "各1個" },
    ],
    steps: [
      "シェイカーに氷・ジン・レモンジュース・シロップを入れてシェイクする",
      "コリンズグラスに氷を入れ、シェイクした液を注ぐ",
      "ソーダ水を静かに加える",
      "軽くステアし、レモンとチェリーで飾る",
    ],
    note: "さわやかな夏向けのロングカクテルです。",
  },
  {
    id: "last-word",
    name: "ラスト・ワード",
    category: "ショート",
    ingredients: [
      { name: "ジン",                    amount: "22.5ml" },
      { name: "グリーン・シャルトリューズ", amount: "22.5ml" },
      { name: "マラスキーノ",            amount: "22.5ml" },
      { name: "ライムジュース（フレッシュ）", amount: "22.5ml" },
    ],
    steps: [
      "シェイカーに氷を入れる",
      "全材料を等量（各22.5ml）注ぐ",
      "しっかりシェイクする",
      "冷やしたカクテルグラスに注ぐ",
    ],
    note: "4種類が完全に等量というシンプルなレシピです。ハーブ系のシャルトリューズとライムが絶妙に合います。",
  },
  {
    id: "clover-club",
    name: "クローバー・クラブ",
    category: "ショート",
    ingredients: [
      { name: "ジン",             amount: "45ml" },
      { name: "レモンジュース",   amount: "20ml" },
      { name: "ラズベリーシロップ", amount: "15ml" },
      { name: "卵白",             amount: "1個分" },
    ],
    steps: [
      "シェイカーに氷なしで全材料を入れ、ドライシェイクする（30秒ほど）",
      "氷を加えて再度シェイクする（10〜12秒）",
      "冷やしたカクテルグラスにダブルストレインで注ぐ",
      "お好みでラズベリーを飾る",
    ],
    note: "ドライシェイクで卵白をしっかり泡立てるのがポイントです。ふわふわのテクスチャーになります。",
  },
];

/* =========================================================
   ■ カテゴリ定義
   ========================================================= */
const CATEGORIES = [
  { id: "all",    name: "すべて" },
  { id: "ショート", name: "ショート" },
  { id: "ロング",   name: "ロング" },
];

let currentCategory = "all";

/* =========================================================
   ■ 描画
   ========================================================= */
function getFilteredRecipes() {
  return currentCategory === "all"
    ? RECIPES
    : RECIPES.filter((r) => r.category === currentCategory);
}

function renderRecipes() {
  const recipes = getFilteredRecipes();
  const grid = document.getElementById("recipe-grid");
  document.getElementById("recipe-count").textContent = RECIPES.length;

  if (recipes.length === 0) {
    grid.innerHTML = '<div class="empty-state">このカテゴリのレシピはまだありません。</div>';
    return;
  }

  grid.innerHTML = recipes.map((r) => `
    <article class="recipe-card" data-id="${r.id}" tabindex="0" role="button" aria-label="${escHtml(r.name)}の詳細を見る">
      <div class="recipe-cat">${escHtml(r.category)}</div>
      <h2 class="recipe-name">${escHtml(r.name)}</h2>
      <ul class="recipe-ingredients">
        ${r.ingredients.map((i) => `
          <li>
            <span>${escHtml(i.name)}</span>
            <span class="amount">${escHtml(i.amount)}</span>
          </li>
        `).join("")}
      </ul>
    </article>
  `).join("");

  grid.querySelectorAll(".recipe-card").forEach((card) => {
    card.addEventListener("click", () => openDetail(card.dataset.id));
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openDetail(card.dataset.id);
    });
  });
}

/* =========================================================
   ■ 詳細モーダル
   ========================================================= */
function openDetail(id) {
  const recipe = RECIPES.find((r) => r.id === id);
  if (!recipe) return;

  document.getElementById("detail-cat").textContent = recipe.category;
  document.getElementById("detail-name").textContent = recipe.name;

  document.getElementById("detail-ingredients").innerHTML = recipe.ingredients
    .map((i) => `<li><span>${escHtml(i.name)}</span><span class="amount">${escHtml(i.amount)}</span></li>`)
    .join("");

  document.getElementById("detail-steps").innerHTML = recipe.steps
    .map((s) => `<li><span>${escHtml(s)}</span></li>`)
    .join("");

  const noteEl = document.getElementById("detail-note");
  if (recipe.note) {
    noteEl.textContent = recipe.note;
    noteEl.style.display = "";
  } else {
    noteEl.style.display = "none";
  }

  document.getElementById("detail-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

/* =========================================================
   ■ タブ
   ========================================================= */
function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "tab" + (i === 0 ? " active" : "");
    btn.textContent = cat.name;
    btn.addEventListener("click", () => {
      tabsEl.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      btn.classList.add("active");
      currentCategory = cat.id;
      renderRecipes();
    });
    tabsEl.appendChild(btn);
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* =========================================================
   ■ イベント
   ========================================================= */
document.getElementById("detail-close").addEventListener("click", closeDetail);
document.getElementById("detail-overlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeDetail();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDetail();
});

/* =========================================================
   ■ 初期化
   ========================================================= */
renderTabs();
renderRecipes();
</script>
</body>
</html>
