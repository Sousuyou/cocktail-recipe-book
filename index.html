<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f1ec">
<title>Bar Soutsu カクテルレシピ帳</title>
<style>
  :root {
    color-scheme: light;
    --bg: #e9e9e5;
    --paper: #fbfaf6;
    --panel: #fbfaf6;
    --panel-soft: #f3f2ee;
    --line: #c9c8c2;
    --line-strong: #242424;
    --text: #161616;
    --muted: #6f6d67;
    --accent: #161616;
    --red: #a72821;
    --shadow: 0 18px 42px rgba(30, 30, 27, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px;
  }

  /* ====== サイト共通ナビ ====== */
  .site-nav {
    width: min(960px, calc(100% - 24px)); margin: 24px auto 0;
    display: flex; border: 1px solid var(--line-strong); border-bottom: 0; background: var(--panel);
  }
  .site-nav-link {
    padding: 0 18px; min-height: 38px; display: grid; place-items: center;
    text-decoration: none; color: var(--text); font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; border-right: 1px solid var(--line);
    transition: background 160ms ease; white-space: nowrap;
  }
  .site-nav-link:last-child { border-right: 0; }
  .site-nav-link:hover { background: var(--panel-soft); }
  .site-nav-link.active { background: var(--accent); color: #fff; }
  body.has-nav .app-shell { margin-top: 0; }

  /* ====== 外枠 ====== */
  .app-shell {
    width: min(960px, calc(100% - 24px)); min-height: calc(100vh - 48px);
    margin: 24px auto; padding: 28px; border: 1px solid var(--line-strong);
    background: var(--paper); box-shadow: var(--shadow);
  }

  /* ====== ヘッダー ====== */
  .hero {
    display: grid; grid-template-columns: minmax(0, 1fr) 230px;
    gap: 18px; align-items: stretch; padding: 0 0 18px; border-bottom: 2px solid var(--line-strong);
  }
  .brand-mark { margin: 0 0 8px; font-size: clamp(1.05rem, 2.5vw, 1.5rem); line-height: 1; font-weight: 700; }
  .eyebrow { margin: 0 0 8px; color: var(--muted); font-size: 0.64rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  h1 { margin: 0; font-size: clamp(1.05rem, 2.5vw, 1.55rem); line-height: 1.18; font-weight: 700; }
  .lead { max-width: 620px; margin: 10px 0 0; color: var(--muted); font-size: 0.78rem; line-height: 1.65; }
  .hero-panel {
    padding: 14px; border: 1px solid var(--line-strong); background: transparent;
    display: grid; align-content: center;
  }
  .hero-panel span, .hero-panel small { display: block; color: var(--muted); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .hero-panel strong { display: block; margin: 6px 0 2px; color: var(--red); font-size: 1.65rem; font-weight: 700; }

  /* ====== 検索ボックス ====== */
  .search-bar { margin-top: 16px; position: relative; display: flex; border: 1px solid var(--line-strong); }
  .search-input {
    flex: 1; min-height: 42px; border: 0; padding: 0 40px 0 14px;
    background: var(--paper); color: var(--text); font-size: 0.84rem; outline: none; font-family: inherit;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { box-shadow: inset 0 -2px 0 var(--accent); }
  .search-clear {
    position: absolute; right: 0; top: 0; bottom: 0; width: 42px;
    border: 0; background: none; color: var(--muted); cursor: pointer;
    font-size: 1.1rem; display: none; align-items: center; justify-content: center; min-height: auto;
  }
  .search-clear.visible { display: flex; }
  .search-clear:hover { color: var(--text); }

  /* ====== カテゴリ＆重要度タブ ====== */
  .tabs {
    margin-top: 16px; display: flex; flex-wrap: wrap;
    border: 1px solid var(--line-strong); background: var(--panel);
  }
  .tab {
    flex: 1 1 auto; min-height: 40px; padding: 0 16px; border: 0;
    border-right: 1px solid var(--line); background: var(--panel); color: var(--text);
    font-size: 0.74rem; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer; transition: background 160ms ease, color 160ms ease; white-space: nowrap;
  }
  .tab:last-child { border-right: 0; }
  .tab:hover { background: var(--panel-soft); }
  .tab.active { background: var(--accent); color: #fff; }

  /* ====== レシピカード一覧 ====== */
  .recipe-grid {
    margin-top: 16px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    border: 1px solid var(--line); border-bottom: 0; border-right: 0;
  }
  .recipe-card {
    padding: 18px 20px 20px; border-bottom: 1px solid var(--line); border-right: 1px solid var(--line);
    background: var(--panel); cursor: pointer; transition: background 160ms ease;
  }
  .recipe-card:hover { background: var(--panel-soft); }

  /* カード：メタ行（カテゴリ・技法・★） */
  .recipe-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .recipe-cat { color: var(--red); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
  .recipe-method-badge { font-size: 0.58rem; font-weight: 700; color: var(--muted); border: 1px solid var(--line); padding: 1px 6px; }
  .recipe-stars { margin-left: auto; color: var(--red); font-size: 0.8rem; letter-spacing: 1px; white-space: nowrap; }
  .recipe-stars .dim { color: var(--line); }

  .recipe-name { margin: 0 0 6px; font-size: 1rem; font-weight: 700; line-height: 1.4; }
  .recipe-tagline { margin: 0 0 12px; font-size: 0.74rem; color: var(--muted); line-height: 1.5; }
  .recipe-ingredients { list-style: none; margin: 0; padding: 10px 0 0; border-top: 1px solid var(--line); }
  .recipe-ingredients li { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.78rem; border-bottom: 1px dashed var(--line); }
  .recipe-ingredients li .amount { color: var(--muted); font-weight: 700; font-size: 0.72rem; margin-left: 8px; white-space: nowrap; }

  mark { background: #f5e642; color: var(--text); padding: 0 1px; }

  /* ====== 詳細モーダル ====== */
  .detail-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(22, 22, 22, 0.65); z-index: 100;
    align-items: flex-start; justify-content: center; padding: 40px 24px; overflow-y: auto;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    background: var(--paper); border: 1px solid var(--line-strong);
    box-shadow: var(--shadow); width: min(560px, 100%); margin: auto; padding: 28px;
  }
  .detail-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding-bottom: 16px; border-bottom: 2px solid var(--line-strong);
  }
  .detail-header-left { flex: 1; }
  .detail-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .detail-stars { color: var(--red); font-size: 0.9rem; letter-spacing: 2px; margin-top: 6px; }
  .detail-stars .dim { color: var(--line); }
  .detail-tagline { margin: 4px 0 0; font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
  .detail-close {
    min-height: 32px; padding: 0 12px; border: 1px solid var(--line);
    background: var(--panel); color: var(--text); font-size: 0.7rem; font-weight: 700;
    cursor: pointer; flex-shrink: 0; margin-left: 16px; transition: background 160ms ease; align-self: flex-start;
  }
  .detail-close:hover { background: var(--panel-soft); }
  .detail-method-banner {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 0 0; padding: 10px 14px; background: var(--accent); color: #fff;
  }
  .detail-method-banner .method-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.7; }
  .detail-method-banner .method-value { font-size: 0.82rem; font-weight: 700; }
  .detail-section-title {
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin: 20px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--line);
  }
  .detail-ingredients { list-style: none; margin: 0; padding: 0; }
  .detail-ingredients li { display: flex; justify-content: space-between; padding: 7px 0; font-size: 0.84rem; border-bottom: 1px dashed var(--line); }
  .detail-ingredients li .amount { color: var(--muted); font-weight: 700; font-size: 0.78rem; margin-left: 16px; white-space: nowrap; }
  .detail-steps { list-style: none; margin: 0; padding: 0; counter-reset: steps; }
  .detail-steps li { counter-increment: steps; display: flex; gap: 12px; padding: 9px 0; font-size: 0.84rem; line-height: 1.65; border-bottom: 1px solid var(--line); }
  .detail-steps li::before {
    content: counter(steps); flex-shrink: 0; width: 22px; height: 22px;
    background: var(--accent); color: #fff; display: grid; place-items: center;
    font-size: 0.66rem; font-weight: 700; margin-top: 2px;
  }
  .detail-note { margin-top: 14px; padding: 12px 14px; background: var(--panel-soft); border-left: 3px solid var(--line-strong); font-size: 0.78rem; line-height: 1.7; color: var(--muted); }
  .detail-trivia { margin-top: 10px; padding: 14px; background: var(--panel); border: 1px solid var(--line); border-left: 3px solid var(--red); font-size: 0.78rem; line-height: 1.75; color: var(--text); }
  .detail-trivia-label { display: block; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red); margin-bottom: 6px; }

  .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 0.8rem; border: 1px solid var(--line); border-top: 0; margin-top: 16px; }
  footer { color: var(--muted); font-size: 0.64rem; line-height: 1.8; margin-top: 20px; padding-top: 14px; border-top: 1px solid var(--line); }

  @media (max-width: 620px) {
    .site-nav { width: min(100% - 16px, 1180px); margin: 8px auto 0; }
    .app-shell { width: min(100% - 16px, 1180px); margin: 0 auto 16px; padding: 14px; }
    .hero { grid-template-columns: 1fr; }
    .recipe-grid { grid-template-columns: 1fr; }
    .detail-overlay { padding: 12px; }
    .detail-panel { padding: 18px; }
  }
</style>
</head>
<body class="has-nav">

<nav class="site-nav">
  <a class="site-nav-link" href="https://sousuyou.github.io/cocktail-cost-tool/">原価計算</a>
  <a class="site-nav-link active" href="https://sousuyou.github.io/cocktail-recipe-book/">レシピ帳</a>
  <a class="site-nav-link" href="https://sousuyou.github.io/gin-textbook/">ジン教本</a>
  <a class="site-nav-link" href="https://sousuyou.github.io/gin-news/">ジンニュース</a>
</nav>

<main class="app-shell">
  <section class="hero">
    <div>
      <p class="brand-mark">Bar Soutsu</p>
      <p class="eyebrow">Cocktail Recipe Book / Gin Speciality</p>
      <h1>カクテルレシピ帳</h1>
      <p class="lead">全レシピジンベース。★の重要度はスタッフが覚えるべき優先度の目安です。</p>
    </div>
    <div class="hero-panel">
      <span>表示中</span>
      <strong id="recipe-count">0</strong>
      <small id="recipe-total">/ 0 件</small>
    </div>
  </section>

  <div class="search-bar">
    <input type="search" id="search-input" class="search-input"
      placeholder="🔍　レシピ名・材料・キーワードで検索…（例：ライム、ステア、禁酒法）" autocomplete="off" />
    <button class="search-clear" id="search-clear" aria-label="検索をクリア">✕</button>
  </div>

  <nav class="tabs" id="tabs" aria-label="カテゴリ"></nav>
  <div class="recipe-grid" id="recipe-grid" aria-label="レシピ一覧"></div>

  <footer>
    ★重要度：★★★＝必須 ／ ★★＝標準 ／ ★＝知識として。ショートは合計60ml・ロングはジン30ml基準。
  </footer>
</main>

<!-- 詳細モーダル -->
<div class="detail-overlay" id="detail-overlay" role="dialog" aria-modal="true">
  <div class="detail-panel">
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-meta">
          <span class="recipe-cat" id="detail-cat"></span>
        </div>
        <h2 id="detail-name" style="margin:0;font-size:1.2rem;font-weight:700;"></h2>
        <div class="detail-stars" id="detail-stars"></div>
        <p class="detail-tagline" id="detail-tagline"></p>
      </div>
      <button class="detail-close" id="detail-close">閉じる</button>
    </div>
    <div class="detail-method-banner">
      <span class="method-label">技法</span>
      <span class="method-value" id="detail-method"></span>
    </div>
    <div class="detail-section-title">材料</div>
    <ul class="detail-ingredients" id="detail-ingredients"></ul>
    <div class="detail-section-title">作り方</div>
    <ol class="detail-steps" id="detail-steps"></ol>
    <div class="detail-section-title" id="note-title" style="display:none;">バーテンダーのコツ</div>
    <div class="detail-note" id="detail-note" style="display:none;"></div>
    <div class="detail-section-title" id="trivia-title" style="display:none;">豆知識・歴史</div>
    <div class="detail-trivia" id="detail-trivia" style="display:none;">
      <span class="detail-trivia-label">History &amp; Trivia</span>
      <span id="detail-trivia-text"></span>
    </div>
  </div>
</div>

<script>
/* stars: 1=★☆☆  2=★★☆  3=★★★ */
const RECIPES = [

  /* ══════════ ショート（合計60ml） ══════════ */
  {
    id: "dry-martini", name: "ドライ・マティーニ", category: "ショート", method: "ステア", stars: 3,
    tagline: "カクテルの王様。潔さが美しい、極乾の一杯。",
    ingredients: [
      { name: "ジン", amount: "50ml" },
      { name: "ドライベルモット", amount: "10ml" },
      { name: "レモンピール（またはオリーブ）", amount: "適量" },
    ],
    steps: [
      "ミキシンググラスに氷を入れ、十分に冷やす",
      "ドライベルモット、ジンの順に注ぐ",

      "冷やしておいたカクテルグラスに注ぐ",
      "レモンピールをひねってアロマを飛ばし、グラスに飾る",
    ],
    note: "シェイクではなくステアが基本。ベルモットの量を減らすほどドライな仕上がりになります。",
    trivia: "マティーニの起源は諸説あり、1860年代にジェリー・トーマスがサンフランシスコで作ったという説や、イタリアの蒸留会社マルティーニ＆ロッシに由来するという説など今も議論が続きます。「カクテルの王様」として世界中のバーで愛され、ウィンストン・チャーチルは「ベルモットのボトルをちらりと見るだけでよい」と豪語したことでも有名。",
  },
  {
    id: "negroni", name: "ネグローニ", category: "ショート", method: "ステア", stars: 3,
    tagline: "等量3種が生む、完璧なビターネス。",
    ingredients: [
      { name: "ジン", amount: "20ml" },
      { name: "スイートベルモット", amount: "20ml" },
      { name: "カンパリ", amount: "20ml" },
      { name: "オレンジピール", amount: "適量" },
    ],
    steps: [
      "ロックグラスに大きな氷を入れる",
      "ジン・スイートベルモット・カンパリを等量注ぐ",
      "バースプーンで15秒ほど静かにステアする",
      "オレンジピールをひねって香りを飛ばし、グラスに飾る",
    ],
    note: "3種類を等量で合わせる王道レシピ。使うジンの個性がそのまま出るので、銘柄を変えて楽しめます。",
    trivia: "1919年、フィレンツェのバー「カフェ・カソーニ」でカミッロ・ネグローニ伯爵が「アメリカーノのソーダをジンに替えてくれ」と注文したのが始まりとされています。「ネグローニ・ウィーク」として世界各地のバーが慈善活動を行うイベントも定着しており、カクテル界で最も社会的影響力のある一杯のひとつです。",
  },
  {
    id: "gimlet", name: "ギムレット", category: "ショート", method: "シェイク", stars: 3,
    tagline: "海軍医が生み、文学が育てた、ライムとジンの古典。",

      { name: "ジン", amount: "45ml" },

  },
  {
    id: "last-word", name: "ラスト・ワード", category: "ショート", method: "シェイク", stars: 3,

  },
  {
    id: "yukiguni", name: "雪国", category: "ショート", method: "シェイク（スノースタイル）", stars: 3,

    ingredients: [
      { name: "ジン（または ウォッカ）", amount: "45ml" },
      { name: "コアントロー", amount: "15ml" },
      { name: "フレッシュライムジュース", amount: "少量（お好みで）" },

      { name: "グリーンチェリー", amount: "1個" },
    ],
    steps: [

/* ── カテゴリ定義 ── */
const CATEGORIES = [
  { id: "all",      name: "すべて" },
  { id: "ショート", name: "ショート（60ml）" },
  { id: "ロング",   name: "ロング（ジン30ml）" },
  { id: "3",        name: "★★★ 必須" },
  { id: "2",        name: "★★ 標準" },
  { id: "1",        name: "★ 知識として" },
];

let currentCategory = "all";
let searchQuery = "";

function starHtml(n, cssClass) {
  return "★".repeat(n) + `<span class="dim">${"★".repeat(3 - n)}</span>`;
}

function getFilteredRecipes() {
  let list = RECIPES;
  if (currentCategory === "3" || currentCategory === "2" || currentCategory === "1") {
    list = list.filter((r) => String(r.stars) === currentCategory);
  } else if (currentCategory !== "all") {
    list = list.filter((r) => r.category === currentCategory);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter((r) =>
      r.name.toLowerCase().includes(q) ||
      r.tagline.toLowerCase().includes(q) ||
      r.method.toLowerCase().includes(q) ||
      r.ingredients.some((i) => i.name.toLowerCase().includes(q)) ||
      (r.note && r.note.toLowerCase().includes(q)) ||
      (r.trivia && r.trivia.toLowerCase().includes(q))
    );
  }
  return list;
}

function highlight(text) {
  if (!searchQuery) return escHtml(text);
  const q = escHtml(searchQuery).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escHtml(text).replace(new RegExp(q, "gi"), (m) => `<mark>${m}</mark>`);
}

function renderRecipes() {
  const recipes = getFilteredRecipes();
  const grid = document.getElementById("recipe-grid");
  document.getElementById("recipe-count").textContent = recipes.length;
  document.getElementById("recipe-total").textContent = `/ ${RECIPES.length} 件`;

  if (recipes.length === 0) {
    grid.innerHTML = '<div class="empty-state">該当するレシピが見つかりませんでした。<br>別のキーワードで検索してみてください。</div>';
    return;
  }

  grid.innerHTML = recipes.map((r) => `
    <article class="recipe-card" data-id="${r.id}" tabindex="0" role="button" aria-label="${escHtml(r.name)}の詳細を見る">
      <div class="recipe-meta">
        <span class="recipe-cat">${escHtml(r.category)}</span>
        <span class="recipe-method-badge">${escHtml(r.method)}</span>
        <span class="recipe-stars">${starHtml(r.stars)}</span>
      </div>
      <h2 class="recipe-name">${highlight(r.name)}</h2>
      <p class="recipe-tagline">${highlight(r.tagline)}</p>
      <ul class="recipe-ingredients">
        ${r.ingredients.map((i) => `
          <li>
            <span>${highlight(i.name)}</span>
            <span class="amount">${escHtml(i.amount)}</span>
          </li>
        `).join("")}
      </ul>
    </article>
  `).join("");

  grid.querySelectorAll(".recipe-card").forEach((card) => {
    card.addEventListener("click", () => openDetail(card.dataset.id));
    card.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openDetail(card.dataset.id);
    });
  });
}

function openDetail(id) {
  const recipe = RECIPES.find((r) => r.id === id);
  if (!recipe) return;

  document.getElementById("detail-cat").textContent = recipe.category;
  document.getElementById("detail-name").textContent = recipe.name;
  document.getElementById("detail-stars").innerHTML = starHtml(recipe.stars);
  document.getElementById("detail-tagline").textContent = recipe.tagline || "";
  document.getElementById("detail-method").textContent = recipe.method;

  document.getElementById("detail-ingredients").innerHTML = recipe.ingredients
    .map((i) => `<li><span>${escHtml(i.name)}</span><span class="amount">${escHtml(i.amount)}</span></li>`)
    .join("");

  document.getElementById("detail-steps").innerHTML = recipe.steps
    .map((s) => `<li><span>${escHtml(s)}</span></li>`)
    .join("");

  const noteTitle = document.getElementById("note-title");
  const noteEl = document.getElementById("detail-note");
  if (recipe.note) {
    noteTitle.style.display = "";
    noteEl.textContent = recipe.note;
    noteEl.style.display = "";
  } else {
    noteTitle.style.display = "none";
    noteEl.style.display = "none";
  }

  const triviaTitle = document.getElementById("trivia-title");
  const triviaEl = document.getElementById("detail-trivia");
  const triviaText = document.getElementById("detail-trivia-text");
  if (recipe.trivia) {
    triviaTitle.style.display = "";
    triviaText.textContent = recipe.trivia;
    triviaEl.style.display = "";
  } else {
    triviaTitle.style.display = "none";
    triviaEl.style.display = "none";
  }

  document.getElementById("detail-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  CATEGORIES.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "tab" + (i === 0 ? " active" : "");
    btn.textContent = cat.name;
    btn.addEventListener("click", () => {
      tabsEl.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      btn.classList.add("active");
      currentCategory = cat.id;
      renderRecipes();
    });
    tabsEl.appendChild(btn);
  });
}

const searchInput = document.getElementById("search-input");
const searchClear = document.getElementById("search-clear");
searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle("visible", searchQuery.length > 0);
  renderRecipes();
});
searchClear.addEventListener("click", () => {
  searchInput.value = "";
  searchQuery = "";
  searchClear.classList.remove("visible");
  searchInput.focus();
  renderRecipes();
});

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

document.getElementById("detail-close").addEventListener("click", closeDetail);
document.getElementById("detail-overlay").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeDetail();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeDetail();
});

renderTabs();
renderRecipes();
</script>
</body>
</html>
